<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>House Price Prediction</title>
</head>
<body>
  <h1>House Price Prediction Dashboard</h1>

  <label>Bedrooms:
    <input id="bedrooms" type="number" value="3">
  </label><br>

  <label>Bathrooms:
    <input id="bathrooms" type="number" value="2">
  </label><br>

  <label>Square feet:
    <input id="sqft" type="number" value="1500">
  </label><br>

  <label>Age (years):
    <input id="age" type="number" value="10">
  </label><br>

  <label>City (0,1,2):
    <input id="city" type="number" value="1">
  </label><br><br>

  <button onclick="makePrediction()">Predict</button>

  <h3>Result:</h3>
  <pre id="result">No prediction yet.</pre>

  <script>
    async function makePrediction() {
      const payload = {
        bedrooms: Number(document.getElementById('bedrooms').value),
        bathrooms: Number(document.getElementById('bathrooms').value),
        sqft: Number(document.getElementById('sqft').value),
        age: Number(document.getElementById('age').value),
        city: Number(document.getElementById('city').value)
      };

      try {
        const res = await fetch("https://a7eqgxqi6b.execute-api.us-east-1.amazonaws.com/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        document.getElementById('result').innerText = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('result').innerText = 'Error: ' + e;
      }
    }
  </script>
</body>
</html>
